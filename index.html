<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Set the theme before first paint to avoid a flash of the wrong mode. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("ff_theme");
          var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Frontera Finds — el swapmeet sin fronteras · SD ⟷ TJ, shipped USA</title>
    <meta name="description" content="Frontera Finds — the online swapmeet for the San Diego–Tijuana border. One-of-one secondhand finds, shipped across the USA or picked up locally." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
